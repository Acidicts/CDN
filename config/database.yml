# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  adapter: postgresql
  encoding: unicode
  database: cdn_development
  pool: 5
  username: vscode

test:
  adapter: sqlite3
  database: storage/test.sqlite3
  pool: 5
  timeout: 5000

production:
  adapter: postgresql
  encoding: unicode
  database: cdn_production
  pool: 5
  username: <%= ENV.fetch("CDN_DATABASE_USER") { "cdn" } %>
  password: <%= ENV.fetch("CDN_DATABASE_PASSWORD") { "" } %>
  host: <%= ENV.fetch("CDN_DATABASE_HOST") { "localhost" } %>
